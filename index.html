<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundial 2026 — Mis Faltantes Panini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #C8102E;
      --gold: #F5A623;
      --dark: #0a0a0f;
      --card-bg: #13131a;
      --border: rgba(245,166,35,0.25);
      --text: #f0f0f0;
      --muted: #888;
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.08);
      --green-border: rgba(34,197,94,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .field-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.035;
      background-image:
        radial-gradient(ellipse 70% 40% at 50% 0%, #ffffff 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.5) 59px, rgba(255,255,255,0.5) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.5) 59px, rgba(255,255,255,0.5) 60px);
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding-bottom: 3rem;
    }

    .hero {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
    }
    .hero::after {
      content: '';
      display: block;
      width: 140px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.2rem auto 0;
    }
    .hero-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 12vw, 90px);
      line-height: 0.88;
      color: #fff;
      letter-spacing: 3px;
    }
    .hero-title span { color: var(--gold); }
    .hero-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .progress-wrap {
      max-width: 560px;
      margin: 0 auto 0.6rem;
      padding: 0 1rem;
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .progress-labels span:last-child { color: var(--green); }
    .progress-bar-bg {
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--gold), var(--green));
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      margin: 1rem auto 1.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      max-width: 560px;
    }
    .stat {
      flex: 1;
      padding: 14px 8px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--gold);
      line-height: 1;
      transition: color 0.3s;
    }
    .stat-num.green { color: var(--green); }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }

    .section {
      max-width: 720px;
      margin: 0 auto 1.4rem;
      padding: 0 1rem;
    }
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .special-pills { display: flex; gap: 10px; flex-wrap: wrap; }
    .special-pill {
      background: linear-gradient(135deg, #1a1508, #2a2010);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
      animation: pulse-gold 2.5s ease-in-out infinite;
    }
    .special-pill.found {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green);
      animation: none;
      text-decoration: line-through;
      opacity: 0.6;
    }

    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,166,35,0); }
      50% { box-shadow: 0 0 10px 2px rgba(245,166,35,0.2); }
    }

    .filter-row {
      max-width: 720px;
      margin: 0 auto 1rem;
      padding: 0 1rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
    .filter-btn.active { background: rgba(245,166,35,0.1); border-color: var(--gold); color: var(--gold); }
    .filter-btn.green-btn.active { background: var(--green-bg); border-color: var(--green); color: var(--green); }

    .search-wrap {
      max-width: 720px;
      margin: 0 auto 1.4rem;
      padding: 0 1rem;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: #1a1a24;
      border: 1px solid var(--border);
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      padding: 11px 16px 11px 42px;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap input::placeholder { color: #444; }
    .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .team-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      padding: 13px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.35s ease both;
    }
    .team-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--gold));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .team-card:hover { border-color: rgba(245,166,35,0.35); transform: translateY(-2px); }
    .team-card:hover::before { opacity: 1; }
    .team-card.all-found {
      border-color: var(--green-border) !important;
      background: #0d1f14;
    }
    .team-card.all-found::before {
      background: linear-gradient(90deg, #16a34a, var(--green));
      opacity: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .team-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--gold);
      line-height: 1;
    }
    .team-card.all-found .team-code { color: var(--green); }
    .team-name { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .count-badge {
      background: rgba(200,16,46,0.15);
      border: 1px solid rgba(200,16,46,0.4);
      color: #ff6b6b;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      padding: 2px 8px;
      border-radius: 4px;
      line-height: 1.2;
      transition: all 0.3s;
    }
    .count-badge.done {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green);
    }

    .nums { display: flex; flex-wrap: wrap; gap: 4px; }

    .num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 3px 6px;
      min-width: 24px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.18s;
    }
    .num:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: scale(1.1);
    }
    .num.found {
      background: var(--green-bg);
      border-color: var(--green-border);
      color: var(--green);
      text-decoration: line-through;
      opacity: 0.5;
      transform: scale(0.95);
    }
    .num.found:hover {
      opacity: 0.8;
      transform: scale(1);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(0.95); }
    }
    .num.popping { animation: pop 0.25s ease forwards; }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      padding: 3rem;
      grid-column: 1 / -1;
    }

    .reset-wrap {
      max-width: 720px;
      margin: 1.5rem auto 0;
      padding: 0 1rem;
      text-align: right;
    }
    .reset-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #444;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--red); color: #ff6b6b; }

    footer {
      text-align: center;
      padding: 2rem 1rem 1rem;
      font-size: 11px;
      color: #2a2a2a;
      letter-spacing: 1.5px;
      font-family: 'Barlow Condensed', sans-serif;
      text-transform: uppercase;
      border-top: 1px solid rgba(255,255,255,0.04);
      margin-top: 2rem;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 22px;
      border-radius: 6px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="field-bg"></div>
<div class="toast" id="toast"></div>

<div class="content">

  <div class="hero">
    <div class="hero-eyebrow">Álbum Panini Oficial</div>
    <div class="hero-title">FIFA WORLD<br><span>CUP 2026™</span></div>
    <div class="hero-sub">Mi lista de faltantes</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels">
      <span>Progreso</span>
      <span id="prog-label">0 conseguidas</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-bar"></div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="s-total">75</div>
      <div class="stat-label">Faltantes</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="s-found">0</div>
      <div class="stat-label">Conseguidas</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s-teams">28</div>
      <div class="stat-label">Selecciones</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Estampas especiales FWC</div>
    <div class="special-pills">
      <span class="special-pill" id="fwc8" onclick="toggleSpecial('fwc8','FWC 8')">⭐ FWC 8</span>
      <span class="special-pill" id="fwc18" onclick="toggleSpecial('fwc18','FWC 18')">⭐ FWC 18</span>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
    <button class="filter-btn green-btn" onclick="setFilter('pending', this)">Solo faltantes</button>
    <button class="filter-btn green-btn" onclick="setFilter('found', this)">Conseguidas ✓</button>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Buscar selección o código..." oninput="applyFilters()" />
  </div>

  <div class="cards-grid" id="grid"></div>

  <div class="reset-wrap">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar progreso</button>
  </div>

</div>

<footer>FIFA World Cup 2026™ &nbsp;·&nbsp; USA · CAN · MEX &nbsp;·&nbsp; Panini Group &nbsp;·&nbsp; Mi álbum personal</footer>

<script>
  const data = [
    { code: "KOR", name: "Corea del Sur",   nums: [1,2,11,12,16,20] },
    { code: "CZE", name: "Rep. Checa",       nums: [3,11] },
    { code: "CAN", name: "Canadá",           nums: [5,13,17] },
    { code: "BIH", name: "Bosnia-Herz.",     nums: [20] },
    { code: "SUI", name: "Suiza",            nums: [8] },
    { code: "MAR", name: "Marruecos",        nums: [20] },
    { code: "SCO", name: "Escocia",          nums: [1] },
    { code: "USA", name: "Estados Unidos",   nums: [4,12] },
    { code: "TUR", name: "Turquía",          nums: [3,7,11,14,15,17] },
    { code: "GER", name: "Alemania",         nums: [15] },
    { code: "CUW", name: "Curazao",          nums: [13,15] },
    { code: "NED", name: "Países Bajos",     nums: [1] },
    { code: "TUN", name: "Túnez",            nums: [7,13] },
    { code: "IRN", name: "Irán",             nums: [9] },
    { code: "NZL", name: "Nueva Zelanda",    nums: [12,13,15] },
    { code: "ESP", name: "España",           nums: [1,11,15,19] },
    { code: "CPV", name: "Cabo Verde",       nums: [1,5,6,10,14,19,20] },
    { code: "KSA", name: "Arabia Saudita",   nums: [6,9] },
    { code: "URU", name: "Uruguay",          nums: [7,15] },
    { code: "FRA", name: "Francia",          nums: [4] },
    { code: "SEN", name: "Senegal",          nums: [11] },
    { code: "IRQ", name: "Irak",             nums: [6,15] },
    { code: "JOR", name: "Jordania",         nums: [5,6,9,10,14,15,19] },
    { code: "COD", name: "Congo RD",         nums: [2,5,8] },
    { code: "UZB", name: "Uzbekistán",       nums: [2,6] },
    { code: "COL", name: "Colombia",         nums: [3] },
    { code: "CRO", name: "Croacia",          nums: [5] },
    { code: "GHA", name: "Ghana",            nums: [2,4,16] },
  ];

  const TOTAL = data.reduce((s,d) => s + d.nums.length, 0) + 2;

  let found = JSON.parse(localStorage.getItem('wc2026_found') || '{}');
  let specialFound = JSON.parse(localStorage.getItem('wc2026_special') || '{}');
  let activeFilter = 'all';

  function saveState() {
    localStorage.setItem('wc2026_found', JSON.stringify(found));
    localStorage.setItem('wc2026_special', JSON.stringify(specialFound));
  }

  function toggleNum(code, num) {
    const key = code + '_' + num;
    found[key] = !found[key];
    saveState();
    updateStats();
    applyFilters();
    if (found[key]) showToast(code + ' #' + num + ' conseguida ✓');
  }

  function toggleSpecial(id, label) {
    specialFound[id] = !specialFound[id];
    saveState();
    const el = document.getElementById(id);
    el.classList.toggle('found', specialFound[id]);
    el.textContent = specialFound[id] ? '✓ ' + label : '⭐ ' + label;
    if (specialFound[id]) showToast(label + ' conseguida ✓');
    updateStats();
  }

  function countFound() {
    return Object.values(found).filter(Boolean).length +
           Object.values(specialFound).filter(Boolean).length;
  }

  function updateStats() {
    const f = countFound();
    document.getElementById('s-found').textContent = f;
    document.getElementById('s-total').textContent = Math.max(0, TOTAL - f);
    const pct = Math.round((f / TOTAL) * 100);
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('prog-label').textContent = f + ' de ' + TOTAL + ' conseguidas (' + pct + '%)';
  }

  function isFound(code, num) { return !!found[code + '_' + num]; }

  function setFilter(type, btn) {
    activeFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase();
    let list = data.filter(d => d.name.toLowerCase().includes(q) || d.code.toLowerCase().includes(q));
    if (activeFilter === 'pending') list = list.filter(d => d.nums.some(n => !isFound(d.code, n)));
    if (activeFilter === 'found')   list = list.filter(d => d.nums.some(n => isFound(d.code, n)));
    renderCards(list);
    document.getElementById('s-teams').textContent = list.length;
  }

  function renderCards(list) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    if (!list.length) {
      grid.innerHTML = '<div class="empty-msg">No se encontró ninguna selección</div>';
      return;
    }
    list.forEach((d, i) => {
      const foundCount = d.nums.filter(n => isFound(d.code, n)).length;
      const allDone = foundCount === d.nums.length;
      const remaining = d.nums.length - foundCount;

      const card = document.createElement('div');
      card.className = 'team-card' + (allDone ? ' all-found' : '');
      card.style.animationDelay = (i * 0.03) + 's';

      const numsHtml = d.nums.map(n =>
        `<span class="num${isFound(d.code, n) ? ' found' : ''}" onclick="clickNum(this,'${d.code}',${n})">${n}</span>`
      ).join('');

      card.innerHTML = `
        <div class="card-top">
          <div>
            <div class="team-code">${d.code}</div>
            <div class="team-name">${d.name}</div>
          </div>
          <div class="${allDone ? 'count-badge done' : 'count-badge'}">${allDone ? '✓' : remaining}</div>
        </div>
        <div class="nums">${numsHtml}</div>
      `;
      grid.appendChild(card);
    });
  }

  function clickNum(el, code, num) {
    el.classList.add('popping');
    el.addEventListener('animationend', () => el.classList.remove('popping'), { once: true });
    toggleNum(code, num);
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function resetAll() {
    if (!confirm('¿Reiniciar todo el progreso? Se perderán todas las marcas.')) return;
    found = {};
    specialFound = {};
    saveState();
    document.getElementById('fwc8').className = 'special-pill';
    document.getElementById('fwc8').textContent = '⭐ FWC 8';
    document.getElementById('fwc18').className = 'special-pill';
    document.getElementById('fwc18').textContent = '⭐ FWC 18';
    updateStats();
    applyFilters();
  }

  // Init — restore special pills state
  if (specialFound['fwc8']) {
    document.getElementById('fwc8').classList.add('found');
    document.getElementById('fwc8').textContent = '✓ FWC 8';
  }
  if (specialFound['fwc18']) {
    document.getElementById('fwc18').classList.add('found');
    document.getElementById('fwc18').textContent = '✓ FWC 18';
  }
  updateStats();
  applyFilters();
</script>
</body>
</html>
